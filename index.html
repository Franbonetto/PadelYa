<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050816">
  <title>PadelYa</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #050816;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* FONDO OSCURO PREMIUM - sin líneas, sin ruido */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 110%, rgba(23,139,255,0.07) 0%, transparent 70%),
        linear-gradient(180deg, #050816 0%, #071224 100%);
      z-index: 0;
    }

    /* CONTENIDO */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      gap: 0;
    }

    /* LOGO */
    .logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
    }

    /* NOMBRE DE MARCA */
    .marca {
      font-size: 28px;
      font-weight: 800;
      color: #F5F7FA;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }

    .marca span {
      color: #178BFF;
    }

    /* TÍTULO PRINCIPAL */
    .titulo {
      font-size: 26px;
      font-weight: 700;
      color: #F5F7FA;
      text-align: center;
      line-height: 1.4;
      letter-spacing: -0.3px;
      margin-bottom: 52px;
    }

    .titulo .linea {
      display: block;
      font-size: 18px;
      font-weight: 300;
      color: #A8B3C7;
      letter-spacing: 0;
      line-height: 2;
    }

    .titulo .linea-acento {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: #F5F7FA;
      line-height: 1.3;
    }

    /* BOTÓN PRIMARIO */
    .btn-primario {
      width: 100%;
      padding: 17px 24px;
      background: #178BFF;
      color: #FFFFFF;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 24px rgba(23,139,255,0.18);
      transition: all 0.2s ease;
      margin-bottom: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primario:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(23,139,255,0.2);
    }

    /* BOTÓN SECUNDARIO - muy discreto */
    .btn-secundario {
      background: transparent;
      border: none;
      color: #A8B3C7;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 12px;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease;
    }

    .btn-secundario:active {
      color: #F5F7FA;
    }

    /* TAGLINE */
    .tagline {
      position: absolute;
      bottom: max(32px, env(safe-area-inset-bottom, 32px));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      color: rgba(168,179,199,0.25);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      z-index: 2;
    }
  </style>
</head>
<body>

<div class="screen">

  <div class="bg"></div>

  <div class="content">

    <img src="logo-padelya.png" alt="PadelYa" class="logo-img">

    <div class="marca">Padel<span style="color:#0D2B6E;">Ya</span></div>

    <h1 class="titulo">
      <span class="linea">Abrís la app.</span>
      <span class="linea">Encontrás partido.</span>
      <span class="linea-acento">Jugás.</span>
    </h1>

    <button class="btn-primario"
            onclick="window.location.href='auth.html?tab=registro'">
      Empezar
    </button>

    <button class="btn-secundario"
            onclick="window.location.href='auth.html?tab=login'">
      Ya tengo cuenta
    </button>

  </div>

  <p class="tagline">Nos vemos en la cancha.</p>

</div>

</body>
</html>
