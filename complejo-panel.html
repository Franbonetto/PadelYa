<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadelYa - Panel Operativo</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #F8FAFC;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .panel-header {
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .panel-header-left img { display: block; height: 36px; }
    .panel-header-left .subtitle {
      font-size: 13px;
      color: #6B7280;
    }
    .panel-header-center {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      text-align: center;
      flex: 1;
    }
    .panel-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .panel-header-right .complejo-nombre {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .indicador-conexion {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 50px;
      border: 1px solid;
      white-space: nowrap;
    }
    .btn-logout {
      background: transparent;
      border: 1.5px solid #E5E7EB;
      color: #6B7280;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-logout:hover { background: #F3F4F6; color: #111827; }

    /* SELECTOR DE FECHA */
    .date-selector {
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .date-btn {
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      background: #F3F4F6;
      color: #374151;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .date-btn .dia-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      opacity: 0.75;
    }
    .date-btn.active {
      background: #2563EB;
      color: #FFFFFF;
    }
    .date-btn:not(.active):hover { background: #E5E7EB; }

    /* LEYENDA */
    .leyenda-bar {
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      padding: 8px 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .leyenda-item {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* GRILLA PRINCIPAL */
    .panel-main {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .cancha-card {
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      overflow: hidden;
    }
    .cancha-header {
      background: #F8FAFC;
      border-bottom: 1px solid #E5E7EB;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cancha-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin: 0;
    }
    .cancha-superficie {
      font-size: 12px;
      background: #EEF2FF;
      color: #4338CA;
      padding: 2px 8px;
      border-radius: 50px;
      font-weight: 600;
    }
    .cancha-estado-general {
      font-size: 12px;
      color: #6B7280;
      margin-left: auto;
      font-weight: 600;
    }

    /* BLOQUES DE TURNO */
    .turno-bloque {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #F3F4F6;
      gap: 12px;
      min-height: 52px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .turno-bloque:last-child { border-bottom: none; }
    .turno-bloque:hover { background: #F8FAFC; }
    .turno-hora {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      min-width: 60px;
    }
    .turno-indicador {
      width: 8px;
      height: 36px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .turno-info { flex: 1; min-width: 0; }
    .turno-titulo {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .turno-badge {
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .turno-accion {
      color: #9CA3AF;
      font-size: 18px;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .turno-accion:hover { background: #F3F4F6; }
  </style>
</head>

      if (rol !== 'complejo' && rol !== 'admin') { window.location.replace('auth.html'); return; }

      localStorage.clear();

        base.cancha4.turnos['09:30'].estado = 'padelya4';
        base.cancha4.turnos['09:30'].jugadores = 4;
        base.cancha4.turnos['17:00'].estado = 'ocupado';
      }

      if (fecha === pasado) {
        base.cancha1.turnos['20:00'].estado = 'padelya1';
        base.cancha1.turnos['20:00'].jugadores = 1;
        base.cancha2.turnos['18:30'].estado = 'ocupado';
        base.cancha3.turnos['21:30'].estado = 'padelya2';
        base.cancha3.turnos['21:30'].jugadores = 2;
      }

      return base;
    }

    var ESTADOS = {
      'libre':      { label: 'Libre',          color: '#16A34A', bg: '#DCFCE7', bar: '#16A34A' },
      'ocupado':    { label: 'Ocupado',        color: '#FFFFFF', bg: '#1F2937', bar: '#1F2937' },
      'padelya1':   { label: 'PadelYa 1/4',    color: '#D97706', bg: '#FEF3C7', bar: '#D97706' },
      'padelya2':   { label: 'PadelYa 2/4',    color: '#D97706', bg: '#FEF3C7', bar: '#D97706' },
      'padelya3':   { label: '⚠ Falta 1 · 3/4', color: '#B45309', bg: '#FDE68A', bar: '#F59E0B' },
      'padelya4':   { label: 'Completo 4/4',   color: '#1D4ED8', bg: '#DBEAFE', bar: '#2563EB' },
      'cancelado':  { label: 'Cancelado',      color: '#DC2626', bg: '#FEE2E2', bar: '#DC2626' },
      'finalizado': { label: 'Finalizado',     color: '#6B7280', bg: '#F3F4F6', bar: '#9CA3AF' }
    };

    var DIAS = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    var DIAS_ABR = ['DOM', 'LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB'];
    var MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    /* ================================================
       CAPA DE ACCESO A DATOS
       Estas funciones se conectarán a Firebase en producción.
       Hoy escriben/leen de DB_LOCAL + sessionStorage.
       ================================================ */

    /* --- HEARTBEAT: actualiza lastSeen cada 60s --- */
    function iniciarHeartbeat() {
      actualizarLastSeen();
      setInterval(function() {
        actualizarLastSeen();
      }, CONFIG.HEARTBEAT_INTERVAL_MS);
    }

    function actualizarLastSeen() {
      DB_LOCAL.complejo.lastSeen = Date.now();
      DB_LOCAL.complejo.estado = 'online';
      /* FIREBASE: db.ref('complejos/' + CONFIG.COMPLEJO_ID).update({
           estado: 'online', lastSeen: firebase.database.ServerValue.TIMESTAMP
         }); */
      sessionStorage.setItem('complejo_lastSeen_' + CONFIG.COMPLEJO_ID, Date.now());
      sessionStorage.setItem('complejo_estado_' + CONFIG.COMPLEJO_ID, 'online');
      actualizarIndicadorConexion(true);
    }

    /* --- VERIFICAR si complejo está online --- */
    function complejoEstaOnline(complejoId) {
      /* FIREBASE: leer lastSeen del complejo y comparar */
      var lastSeen = parseInt(
        sessionStorage.getItem('complejo_lastSeen_' + (complejoId || CONFIG.COMPLEJO_ID)) || '0'
      );
      if (!lastSeen) return false;
      return (Date.now() - lastSeen) < CONFIG.OFFLINE_THRESHOLD_MS;
    }

    /* --- ACTUALIZAR estado de un turno --- */
    function actualizarTurno(canchaId, hora, nuevoEstado, jugadores, partidoId) {
      /* FIREBASE: db.ref('complejos/COMPLEJO_ID/canchas/CANCHA/turnos/HORA').set({
           estado: nuevoEstado, jugadores: jugadores || 0,
           partidoId: partidoId || null, updatedAt: ServerValue.TIMESTAMP
         }); */
      if (DB_LOCAL.canchas[canchaId] && DB_LOCAL.canchas[canchaId].turnos[hora]) {
        DB_LOCAL.canchas[canchaId].turnos[hora].estado = nuevoEstado;
        DB_LOCAL.canchas[canchaId].turnos[hora].jugadores = jugadores || 0;
        DB_LOCAL.canchas[canchaId].turnos[hora].partidoId = partidoId || null;
      }
      // Sincronizar con sessionStorage para app jugador
      var clave = 'turno_' + CONFIG.COMPLEJO_ID + '_' + canchaId + '_' + hora.replace(':', '');
      sessionStorage.setItem(clave, nuevoEstado);
    }

    /* --- LEER estado de un turno --- */
    function leerEstadoTurno(complejoId, canchaId, hora) {
      /* FIREBASE: await db.ref('complejos/COMPLEJO_ID/canchas/CANCHA/turnos/HORA').once('value') */
      var clave = 'turno_' + complejoId + '_' + canchaId + '_' + hora.replace(':', '');
      return sessionStorage.getItem(clave) || 'libre';
    }

    /* --- CREAR PARTIDO desde jugador --- */
    function crearPartidoEnComplejo(complejoId, canchaId, hora, partidoId) {
      /* FIREBASE: transaction para verificar disponibilidad y crear partido */
      var clave = 'turno_' + complejoId + '_' + canchaId + '_' + hora.replace(':', '');
      var estadoActual = sessionStorage.getItem(clave);
      if (estadoActual && estadoActual !== 'libre') return false;
      sessionStorage.setItem(clave, 'padelya1');
      return true;
    }

    /* --- ACTUALIZAR jugadores de un partido --- */
    function actualizarJugadoresPartido(complejoId, canchaId, hora, cantidad) {
      /* FIREBASE: transaction en partidos/{id}/jugadores */
      var clave = 'turno_' + complejoId + '_' + canchaId + '_' + hora.replace(':', '');
      var estado = cantidad === 1 ? 'padelya1' :
                   cantidad === 2 ? 'padelya2' :
                   cantidad === 3 ? 'padelya3' : 'padelya4';
      sessionStorage.setItem(clave, estado);
    }

    /* ================================================
       INDICADOR DE CONEXIÓN DEL COMPLEJO
       ================================================ */

    function actualizarIndicadorConexion(online) {
      var indicador = document.getElementById('indicador-conexion');
      if (!indicador) return;
      if (online) {
        indicador.style.background = '#DCFCE7';
        indicador.style.color = '#16A34A';
        indicador.style.borderColor = '#86EFAC';
        indicador.innerHTML = '● Online';
      } else {
        indicador.style.background = '#FEE2E2';
        indicador.style.color = '#DC2626';
        indicador.style.borderColor = '#FCA5A5';
        indicador.innerHTML = '● Sin conexión';
      }
    }

    /* ================================================
       VERIFICACIÓN PERIÓDICA DE CONEXIÓN
       Simula lo que Firebase haría con onDisconnect
       ================================================ */
    setInterval(function() {
      var online = complejoEstaOnline();
      actualizarIndicadorConexion(online);
      if (!online) {
        DB_LOCAL.complejo.estado = 'offline';
        sessionStorage.setItem('complejo_estado_' + CONFIG.COMPLEJO_ID, 'offline');
        mostrarBannerOffline();
      } else {
        ocultarBannerOffline();
      }
    }, 10000);

    function mostrarBannerOffline() {
      var banner = document.getElementById('banner-offline');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'banner-offline';
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;' +
          'background:#DC2626;color:white;text-align:center;padding:10px;' +
          'font-size:14px;font-weight:600;';
        banner.textContent = '⚠ Sin conexión · Las acciones están pausadas temporalmente';
        document.body.prepend(banner);
        document.body.style.paddingTop = '42px';
      }
    }

    function ocultarBannerOffline() {
      var banner = document.getElementById('banner-offline');
      if (banner) {
        banner.remove();
        document.body.style.paddingTop = '0';
      }
    }

    /* ================================================
       SELECTOR DE FECHA
       ================================================ */

    function renderFechaHoy() {
      var d = new Date(FECHA_SELECCIONADA + 'T00:00:00');
      var hoy = new Date().toISOString().split('T')[0];
      var manana = new Date(Date.now() + 86400000).toISOString().split('T')[0];
      var prefijo = FECHA_SELECCIONADA === hoy ? 'Hoy · ' :
        FECHA_SELECCIONADA === manana ? 'Mañana · ' : '';
      document.getElementById('fecha-hoy').textContent =
        prefijo + DIAS[d.getDay()] + ' ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    }

    function renderSelectorFechas() {
      var contenedor = document.getElementById('date-selector');
      contenedor.innerHTML = '';
      var hoy = new Date();
      for (var i = 0; i < 7; i++) {
        var d = new Date(hoy);
        d.setDate(hoy.getDate() + i);
        var fechaISO = d.toISOString().split('T')[0];
        var btn = document.createElement('button');
        btn.className = 'date-btn' + (fechaISO === FECHA_SELECCIONADA ? ' active' : '');
        btn.setAttribute('data-fecha', fechaISO);
        btn.innerHTML = '<span class="dia-label">' + (i === 0 ? 'HOY' : DIAS_ABR[d.getDay()]) + '</span>' + d.getDate();
        btn.onclick = (function(f) {
          return function() { cambiarFecha(f); };
        })(fechaISO);
        contenedor.appendChild(btn);
      }
    }

    function cambiarFecha(fecha) {
      FECHA_SELECCIONADA = fecha;
      DB_LOCAL.canchas = obtenerDatosPorFecha(fecha);

      renderFechaHoy();
      renderSelectorFechas();
      renderCanchas();
      if (typeof actualizarResumen === 'function') actualizarResumen();
    }

    /* ================================================
       RESUMEN DEL DIA (lee DB_LOCAL)
       ================================================ */

    function actualizarResumen() {
      var contadores = {
        libre: 0, ocupado: 0,
        padelya1: 0, padelya2: 0, padelya3: 0,
        padelya4: 0, cancelado: 0, finalizado: 0
      };
      Object.keys(DB_LOCAL.canchas).forEach(function(canchaId) {
        var turnos = DB_LOCAL.canchas[canchaId].turnos;
        Object.keys(turnos).forEach(function(hora) {
          var estado = turnos[hora].estado;
          if (contadores[estado] !== undefined) contadores[estado]++;
        });
      });

      var padel = contadores.padelya1 + contadores.padelya2;
      var falta1 = contadores.padelya3;
      var completos = contadores.padelya4;

      var resumen = document.getElementById('resumen-dia');
      if (!resumen) return;
      resumen.innerHTML =
        itemResumen(contadores.libre, 'Libres', '#16A34A') +
        sepResumen() +
        itemResumen(contadores.ocupado, 'Ocupadas', '#1F2937') +
        sepResumen() +
        itemResumen(padel, 'PadelYa', '#D97706') +
        sepResumen() +
        itemResumen(falta1, 'Falta 1', '#F59E0B') +
        sepResumen() +
        itemResumen(completos, 'Completos', '#2563EB') +
        sepResumen() +
        itemResumen(contadores.cancelado, 'Cancelados', '#DC2626');
    }
    function itemResumen(n, label, color) {
      return '<div style="text-align:center;padding:0 12px;">' +
        '<p style="font-size:22px;font-weight:800;color:' + color + ';margin:0;">' + n + '</p>' +
        '<p style="font-size:11px;color:#6B7280;margin:0;">' + label + '</p>' +
        '</div>';
    }
    function sepResumen() {
      return '<div style="width:1px;background:#E5E7EB;"></div>';
    }

    /* ================================================
       RENDER DE CANCHAS (lee DB_LOCAL)
       ================================================ */

    function obtenerInfoTurno(estado) {
      switch (estado) {
        case 'libre': return 'Libre';
        case 'ocupado': return 'Ocupado';
        case 'padelya1': return 'Partido PadelYa · 1/4';
        case 'padelya2': return 'Partido PadelYa · 2/4';
        case 'padelya3': return 'Partido PadelYa · <strong style="color:#B45309;">¡Falta 1!</strong> · 3/4';
        case 'padelya4': return 'Partido PadelYa · 4/4';
        case 'cancelado': return 'Cancelado';
        case 'finalizado': return 'Finalizado';
        default: return ESTADOS[estado] ? ESTADOS[estado].label : estado;
      }
    }

    function renderCanchas() {
      var contenedor = document.getElementById('grilla-canchas');
      if (!contenedor) return;
      contenedor.innerHTML = '';

      Object.keys(DB_LOCAL.canchas).forEach(function(canchaId) {
        var cancha = DB_LOCAL.canchas[canchaId];
        var horas = Object.keys(cancha.turnos);
        var libres = horas.filter(function(h) { return cancha.turnos[h].estado === 'libre'; }).length;
        var ocupadas = horas.length - libres;

        var card = document.createElement('div');
        card.className = 'cancha-card';

        var header = '<div class="cancha-header">' +
          '<h2>' + escapeHtml(cancha.nombre) + '</h2>' +
          '<span class="cancha-superficie">' + escapeHtml(cancha.superficie) + '</span>' +
          '<span class="cancha-estado-general"><span style="color:#16A34A;">●</span> ' + libres + ' libres · ' + ocupadas + ' ocupadas</span>' +
          '</div>';

        var turnos = '';
        horas.forEach(function(hora) {
          turnos += crearBloqueTurno(canchaId, hora, cancha.turnos[hora]);
        });

        card.innerHTML = header + '<div>' + turnos + '</div>';
        contenedor.appendChild(card);
      });
    }

    function crearBloqueTurno(canchaId, hora, turno) {
      var e = ESTADOS[turno.estado] || ESTADOS['libre'];

      return '<div class="turno-bloque" onclick="abrirAcciones(\'' + canchaId + '\',\'' + hora + '\')">' +
        '<span class="turno-hora">' + hora + '</span>' +
        '<div class="turno-indicador" style="background:' + e.bar + ';"></div>' +
        '<div class="turno-info">' +
        '<p class="turno-titulo">' + obtenerInfoTurno(turno.estado) + '</p>' +
        '</div>' +
        '<span class="turno-badge" style="background:' + e.bg + ';color:' + e.color + ';">' + escapeHtml(e.label) + '</span>' +
        '<span class="turno-accion" onclick="event.stopPropagation();abrirAcciones(\'' + canchaId + '\',\'' + hora + '\')">···</span>' +
        '</div>';
    }

    function rerender() {
      renderCanchas();
      actualizarResumen();
    }

    /* ================================================
       MODAL DE ACCIONES
       ================================================ */

    function getModal() {
      var modal = document.getElementById('modal-acciones');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'modal-acciones';
        document.body.appendChild(modal);
      }
      return modal;
    }

    function cerrarModal() {
      var m = document.getElementById('modal-acciones');
      if (m) m.style.display = 'none';
    }

    function btnStyle(color) {
      return 'width:100%;padding:12px;background:' + color + ';color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit;';
    }
    function btnStyleOut(color) {
      return 'width:100%;padding:12px;background:transparent;color:' + color + ';border:1.5px solid ' + color + ';border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit;';
    }

    function abrirAcciones(canchaId, hora) {
      var cancha = DB_LOCAL.canchas[canchaId];
      if (!cancha) return;
      var estado = cancha.turnos[hora].estado;
      var modal = getModal();
      var acciones = '';

      if (estado === 'libre') {
        acciones =
          '<button onclick="confirmarMarcarOcupado(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyle('#1F2937') + '">Marcar como Ocupado</button>' +
          '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + '">Cancelar</button>';

      } else if (estado === 'ocupado') {
        acciones =
          '<button onclick="ejecutarLiberarTurno(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyle('#16A34A') + '">Liberar · Marcar como Libre</button>' +
          '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + '">Cancelar</button>';

      } else if (estado === 'padelya1' || estado === 'padelya2' || estado === 'padelya3') {
        acciones =
          '<button onclick="cerrarModal();mostrarToastComplejo(\'Función disponible próximamente.\', \'#2563EB\')" style="' + btnStyle('#2563EB') + '">Ver jugadores</button>' +
          '<button onclick="confirmarCancelarYOcupar(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyle('#D97706') + '">Cancelar PadelYa y marcar ocupado</button>' +
          '<button onclick="confirmarCancelarPadelYa(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyleOut('#DC2626') + '">Cancelar partido</button>' +
          '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + '">Cerrar</button>';

      } else if (estado === 'padelya4') {
        acciones =
          '<button onclick="cerrarModal();mostrarToastComplejo(\'Función disponible próximamente.\', \'#2563EB\')" style="' + btnStyle('#6B7280') + '">Ver jugadores</button>' +
          '<button onclick="ejecutarMarcarFinalizado(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyleOut('#6B7280') + '">Marcar finalizado</button>' +
          '<button onclick="ejecutarNoPresento(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyleOut('#D97706') + '">No se presentaron</button>' +
          '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + '">Cerrar</button>';

      } else if (estado === 'cancelado') {
        acciones =
          '<button onclick="ejecutarLiberarTurno(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyle('#16A34A') + '">Liberar horario</button>' +
          '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + '">Cerrar</button>';

      } else if (estado === 'finalizado') {
        acciones =
          '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + '">Cerrar</button>';
      }

      modal.innerHTML =
        '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:16px;">' +
        '<div style="background:#fff;border-radius:16px;padding:20px;width:100%;max-width:420px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
        '<h3 style="font-size:16px;font-weight:700;color:#111827;margin:0;">' + escapeHtml(cancha.nombre) + ' · ' + hora + '</h3>' +
        '<button onclick="cerrarModal()" style="background:#F3F4F6;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;">×</button>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:8px;">' + acciones + '</div>' +
        '</div></div>';
      modal.style.display = 'block';
    }

    /* ================================================
       EJECUTORES DE ACCIONES

        '<div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px;text-align:center;">' +

      var modal = getModal();

      modal.innerHTML =
        '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;">' +
        '<div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">' +
        '<div style="width:48px;height:48px;background:#FEF3C7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;">⚠️</div>' +
        '<h3 style="font-size:17px;font-weight:700;color:#111827;text-align:center;margin:0 0 10px;">Cancelar partido y ocupar horario</h3>' +
        '<p style="font-size:14px;color:#4B5563;text-align:center;line-height:1.6;margin:0 0 20px;">' +

        '</p>' +
        '<button onclick="ejecutarCancelarYOcupar(\'' + canchaId + '\',\'' + hora + '\')" style="' + btnStyle('#D97706') + 'text-align:center;margin-bottom:8px;">Confirmar y ocupar</button>' +
        '<button onclick="cerrarModal()" style="' + btnStyleOut('#6B7280') + 'text-align:center;">Cancelar</button>' +
        '</div></div>';

      modal.style.display = 'block';

    function ejecutarCancelarYOcupar(canchaId, hora) {

          horasConflicto.push(h);

    function obtenerHorasSeleccionadas(todasLasHoras) {
      if (tipoBloqueoActual === 'dia') {
        return todasLasHoras;
      }

      var desdeEl = document.getElementById('bl-desde');
      var hastaEl = document.getElementById('bl-hasta');
      var desde = desdeEl ? desdeEl.value : null;
      var hasta = hastaEl ? hastaEl.value : null;

      if (!desde || !hasta) return todasLasHoras;

      return todasLasHoras.filter(function(h) {
        return h >= desde && h <= hasta;
      });
    }

    function generarTextoResumen(nombreCancha, horas) {
      var texto = escapeHtml(nombreCancha) + '<br>';

      if (tipoBloqueoActual === 'dia') {
        var fechaEl = document.getElementById('bl-fecha');
        var fecha = fechaEl ? fechaEl.value : '';
        texto += 'Todo el día · ' + formatearFechaBloqueo(fecha);

      } else if (tipoBloqueoActual === 'franja') {
        var fechaEl2 = document.getElementById('bl-fecha');
        var fecha2 = fechaEl2 ? fechaEl2.value : '';
        var desdeEl = document.getElementById('bl-desde');
        var hastaEl = document.getElementById('bl-hasta');
        var desde = desdeEl ? desdeEl.value : '';
        var hasta = hastaEl ? hastaEl.value : '';
        texto += formatearFechaBloqueo(fecha2) + ' · ' + desde + ' a ' + hasta + ' hs';

      } else if (tipoBloqueoActual === 'recurrente') {
        var diasSeleccionados = [];
        var nombres = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
        document.querySelectorAll('.dia-btn').forEach(function(el, i) {
          if (el.style.background === 'rgb(31, 41, 55)') diasSeleccionados.push(nombres[i]);
        });
        var desdeEl3 = document.getElementById('bl-desde');
        var hastaEl3 = document.getElementById('bl-hasta');
        var desde3 = desdeEl3 ? desdeEl3.value : '';
        var hasta3 = hastaEl3 ? hastaEl3.value : '';
        var fechaDesdeEl = document.getElementById('bl-fecha-desde');
        var fechaHastaEl = document.getElementById('bl-fecha-hasta');
        var fechaDesde = fechaDesdeEl ? fechaDesdeEl.value : '';
        var fechaHasta = fechaHastaEl ? fechaHastaEl.value : '';
        texto += diasSeleccionados.join(', ') + '<br>';
        texto += desde3 + ' a ' + hasta3 + ' hs<br>';
        texto += 'Desde ' + formatearFechaBloqueo(fechaDesde) + ' hasta ' + formatearFechaBloqueo(fechaHasta);
      }

      return texto;
    }

    function formatearFechaBloqueo(iso) {
      if (!iso) return '';
      var d = new Date(iso + 'T00:00:00');
      var dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
      return dias[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth() + 1);
    }

    function ejecutarBloqueoMasivo() {
      var canchaId = BLOQUEO_PENDIENTE.canchaId;
      var horasLibres = BLOQUEO_PENDIENTE.horasLibres;
      var horasConflicto = BLOQUEO_PENDIENTE.horasConflicto;

      if (!canchaId) {
        mostrarToastComplejo('Error: no hay bloqueo pendiente.', '#DC2626');
        return;
      }

      var total = 0;

      horasLibres.forEach(function(hora) {
        if (DB_LOCAL.canchas[canchaId] && DB_LOCAL.canchas[canchaId].turnos[hora]) {
          DB_LOCAL.canchas[canchaId].turnos[hora].estado = 'ocupado';
          DB_LOCAL.canchas[canchaId].turnos[hora].jugadores = 0;
          DB_LOCAL.canchas[canchaId].turnos[hora].partidoId = null;
        }
        var clave = 'turno_' + CONFIG.COMPLEJO_ID + '_' + canchaId + '_' + hora.replace(':', '');
        sessionStorage.setItem(clave, 'ocupado');
        total++;
      });

      horasConflicto.forEach(function(hora) {
        if (DB_LOCAL.canchas[canchaId] && DB_LOCAL.canchas[canchaId].turnos[hora]) {
          DB_LOCAL.canchas[canchaId].turnos[hora].estado = 'ocupado';
          DB_LOCAL.canchas[canchaId].turnos[hora].jugadores = 0;
          DB_LOCAL.canchas[canchaId].turnos[hora].partidoId = null;
        }
        var clave = 'turno_' + CONFIG.COMPLEJO_ID + '_' + canchaId + '_' + hora.replace(':', '');
        sessionStorage.setItem(clave, 'ocupado');

        var misPartidos = JSON.parse(sessionStorage.getItem('misPartidos') || '[]');
        misPartidos = misPartidos.map(function(p) {
          if (p.hora === hora) { p.estado = 'cancelado'; p.canceladoPorComplejo = true; }
          return p;
        });
        sessionStorage.setItem('misPartidos', JSON.stringify(misPartidos));

        var unidos = JSON.parse(sessionStorage.getItem('partidosUnidos') || '[]');
        unidos = unidos.map(function(p) {
          if (p.hora === hora) { p.estado = 'cancelado'; p.canceladoPorComplejo = true; }
          return p;
        });
        sessionStorage.setItem('partidosUnidos', JSON.stringify(unidos));

        total++;
      });

      BLOQUEO_PENDIENTE = { canchaId: null, horasLibres: [], horasConflicto: [] };

      cerrarBloqueo();
      renderCanchas();
      if (typeof actualizarResumen === 'function') actualizarResumen();

      mostrarToastComplejo('✓ ' + total + ' horario(s) bloqueados', '#1F2937');
    }

    function cerrarBloqueo() {
      var m = document.getElementById('modal-bloqueo');
      if (m) m.style.display = 'none';
    }

    /* ================================================

       Lee partidos creados/sumados desde la app del jugador

    function sincronizarConPadelYa() {
      var misPartidos = JSON.parse(sessionStorage.getItem('misPartidos') || '[]');
      var partidosUnidos = JSON.parse(sessionStorage.getItem('partidosUnidos') || '[]');
      var todosPartidos = misPartidos.concat(partidosUnidos);

      todosPartidos.forEach(function(p) {
        if (!p.canchaId || !p.hora || p.estado === 'cancelado') return;
        var jugadores = p.jugadores || 1;
        actualizarJugadoresPartido(CONFIG.COMPLEJO_ID, p.canchaId, p.hora, jugadores);
      });
    }

    function aplicarEstadosGuardados() {
      Object.keys(DB_LOCAL.canchas).forEach(function(canchaId) {
        var turnos = DB_LOCAL.canchas[canchaId].turnos;
        Object.keys(turnos).forEach(function(hora) {
          var clave = 'turno_' + CONFIG.COMPLEJO_ID + '_' + canchaId + '_' + hora.replace(':', '');
          var guardado = sessionStorage.getItem(clave);
          if (guardado && ESTADOS[guardado]) {
            turnos[hora].estado = guardado;
          }
        });
      });
    }

       ================================================ */

    var HISTORIAL_PARTIDOS = [
      { fecha: 'Vie 13/6', cancha: 'Cancha 1', hora: '20:00' },
      { fecha: 'Vie 13/6', cancha: 'Cancha 3', hora: '18:30' },
      { fecha: 'Sáb 14/6', cancha: 'Cancha 2', hora: '21:00' },
      { fecha: 'Sáb 14/6', cancha: 'Cancha 1', hora: '19:00' },
      { fecha: 'Dom 15/6', cancha: 'Cancha 4', hora: '20:00' },
      { fecha: 'Dom 15/6', cancha: 'Cancha 2', hora: '18:30' },
      { fecha: 'Lun 16/6', cancha: 'Cancha 1', hora: '21:30' },
      { fecha: 'Mar 17/6', cancha: 'Cancha 3', hora: '20:00' },
      { fecha: 'Mié 18/6', cancha: 'Cancha 2', hora: '19:00' },
      { fecha: 'Jue 19/6', cancha: 'Cancha 1', hora: '20:00' }
    ];

    function cambiarTabComplejo(tab) {
      var operativo = document.getElementById('tab-operativo');
      var historial = document.getElementById('tab-historial');
      var btnOp = document.getElementById('btn-tab-operativo');
      var btnHis = document.getElementById('btn-tab-historial');
      if (tab === 'operativo') {
        if (operativo) operativo.style.display = 'block';
        if (historial) historial.style.display = 'none';
        if (btnOp) { btnOp.style.color = '#111827'; btnOp.style.borderBottom = '2px solid #2563EB'; btnOp.style.fontWeight = '700'; }
        if (btnHis) { btnHis.style.color = '#6B7280'; btnHis.style.borderBottom = '2px solid transparent'; btnHis.style.fontWeight = '500'; }
      } else {
        if (operativo) operativo.style.display = 'none';
        if (historial) historial.style.display = 'block';
        if (btnHis) { btnHis.style.color = '#111827'; btnHis.style.borderBottom = '2px solid #2563EB'; btnHis.style.fontWeight = '700'; }
        if (btnOp) { btnOp.style.color = '#6B7280'; btnOp.style.borderBottom = '2px solid transparent'; btnOp.style.fontWeight = '500'; }
        renderHistorial();
      }
    }

    function renderHistorial() {
      var lista = document.getElementById('lista-historial');
      var contador = document.getElementById('contador-partidos-mes');
      if (!lista) return;

      var misPartidos = JSON.parse(localStorage.getItem('misPartidos') || '[]');
      var completados = misPartidos.filter(function(p) { return p.jugadores >= 4 || p.estado === 'finalizado'; });

      var todos = HISTORIAL_PARTIDOS.concat(completados.map(function(p) {
        return { fecha: p.fecha || 'Este mes', cancha: 'Cancha 1', hora: p.hora || '20:00' };
      }));

      if (contador) contador.textContent = todos.length;

      if (todos.length === 0) {
        lista.innerHTML = '<div style="padding:32px;text-align:center;"><p style="font-size:15px;color:#9CA3AF;">Todavía no hay partidos este mes.</p></div>';
        return;
      }

      lista.innerHTML = '';
      todos.forEach(function(p, idx) {
        var fila = document.createElement('div');
        fila.style.cssText = 'display:flex;align-items:center;padding:14px 16px;' + (idx < todos.length - 1 ? 'border-bottom:1px solid #F3F4F6;' : '') + 'gap:12px;';
        fila.innerHTML =
          '<span style="font-size:13px;font-weight:700;color:#9CA3AF;min-width:24px;">' + (idx + 1) + '</span>' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3.5 9.5 Q7 12 3.5 14.5"/><path d="M20.5 9.5 Q17 12 20.5 14.5"/></svg>' +
          '<div style="flex:1;"><p style="font-size:14px;font-weight:600;color:#111827;margin:0;">' + escapeHtml(p.cancha) + ' · ' + p.hora + ' hs</p><p style="font-size:12px;color:#6B7280;margin:2px 0 0;">' + escapeHtml(p.fecha) + '</p></div>' +
          '<span style="font-size:11px;font-weight:700;background:#DBEAFE;color:#2563EB;padding:3px 10px;border-radius:50px;">PadelYa</span>';
        lista.appendChild(fila);
      });
    }

    function exportarResumen() {
      var total = HISTORIAL_PARTIDOS.length;
      var texto = 'Resumen PadelYa · Junio 2026\nComplejo: Chingoland\n\nPartidos generados: ' + total + '\n\nDetalle:\n';
      HISTORIAL_PARTIDOS.forEach(function(p, i) {
        texto += (i + 1) + '. ' + p.fecha + ' · ' + p.cancha + ' · ' + p.hora + ' hs\n';
      });
      texto += '\nContacto: contactopadelya@gmail.com';
      window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
    }

    document.addEventListener('DOMContentLoaded', function() {
      DB_LOCAL.canchas = obtenerDatosPorFecha(FECHA_SELECCIONADA);
      renderFechaHoy();
      renderSelectorFechas();
      iniciarHeartbeat();
      sincronizarConPadelYa();
      aplicarEstadosGuardados();
      renderCanchas();
      actualizarResumen();
      cambiarTabComplejo('operativo');
    });
  </script>
